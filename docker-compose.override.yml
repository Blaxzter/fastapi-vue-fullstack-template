services:
    db:
        restart: "no"
        ports:
            - "${POSTGRES_PORT}:5432"

    adminer:
        restart: "no"
        ports:
            - "8080:8080"

    prestart:
        build:
            context: ./backend

    backend:
        restart: "no"
        ports:
            - "8000:8000"
        build:
            context: ./backend
        command:
            - fastapi
            - dev
            - --host
            - "0.0.0.0"
            - app/main.py
        develop:
            watch:
                - path: ./backend/app
                  action: sync
                  target: /app/app
                - path: ./backend/pyproject.toml
                  action: rebuild
                - path: ./backend/uv.lock
                  action: rebuild
        volumes:
            - ./backend/htmlcov:/app/htmlcov

    frontend:
        restart: "no"
        ports:
            - "5173:5173"
        build:
            context: ./frontend
            dockerfile: Dockerfile.dev
        environment:
            - VITE_API_URL=http://localhost:8000/api/v1
        develop:
            watch:
                - path: ./frontend/src
                  action: sync
                  target: /app/src
                - path: ./frontend/index.html
                  action: sync
                  target: /app/index.html
                - path: ./frontend/public
                  action: sync
                  target: /app/public
                - path: ./frontend/package.json
                  action: rebuild
                - path: ./frontend/pnpm-lock.yaml
                  action: rebuild

    mailcatcher:
        image: schickling/mailcatcher
        ports:
            - "1080:1080"
            - "1025:1025"

    playwright:
        build:
            context: ./frontend
            dockerfile: Dockerfile.playwright
            args:
                - VITE_API_URL=http://backend:8000/api/v1
                - NODE_ENV=production
        ipc: host
        depends_on:
            - backend
            - mailcatcher
        env_file:
            - .env
        environment:
            - VITE_API_URL=http://backend:8000/api/v1
            - MAILCATCHER_HOST=http://mailcatcher:1080
            - PLAYWRIGHT_HTML_HOST=0.0.0.0
            - CI=${CI}
        volumes:
            - ./frontend/blob-report:/app/blob-report
            - ./frontend/test-results:/app/test-results
        ports:
            - "9323:9323"

networks:
    traefik-net:
        # Not external locally — production uses the real Traefik network
        external: false
